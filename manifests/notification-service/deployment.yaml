apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: banking-platform
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          env:
            # Configuration from ConfigMap
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: banking-app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: banking-app-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: banking-app-config
                  key: DB_NAME
            - name: NOTIFICATION_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: banking-app-config
                  key: NOTIFICATION_SERVICE_PORT
            - name: APP_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: banking-app-config
                  key: APP_ENVIRONMENT
            # Secrets
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: banking-app-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banking-app-secret
                  key: DB_PASSWORD
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: banking-app-secret
                  key: API_KEY
